syntax = "proto3";

package minirpc;

// RpcMessage is the application-level payload carried by a 4-byte length
// prefixed TCP frame. The C++ demo includes a small protobuf wire-format
// codec for this exact schema so the project can compile without protoc.
message RpcMessage {
  enum Kind {
    UNKNOWN = 0;
    REQUEST = 1;
    RESPONSE = 2;
    NOTIFY = 3;
    HEARTBEAT = 4;
  }

  uint64 id = 1;
  Kind kind = 2;
  string service = 3;
  string method = 4;
  bytes payload = 5;
  int32 status = 6;
  string error = 7;
}

